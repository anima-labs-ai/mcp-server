name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Pinned to the bun the anima monorepo's CI runs. `bun-version: latest`
      # made setup-bun resolve the tag through api.github.com on every run, so
      # a GitHub API hiccup fast-failed this job in ~7s before a single check
      # ran (observed 2026-07-16 on 6ecedfc: "Failed to fetch url
      # .../oven-sh/bun/git/refs/tags (status code: 503)"). An exact version
      # downloads the release directly and keeps the API off the critical path.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14
          cache: true
      - run: bun install --frozen-lockfile
      - name: Lint — rebrand mangle guard
        # The 2026-05 rebrand find-replace (anima.email → useanima.sh) mangled
        # the code identifier `anima.emails.*` into a nonsense token in other
        # repos (spec item C1). Fail CI if it ever appears here. NOTE: every
        # mention of the token in this step (pattern and message) must keep
        # the backslash-escaped dot, or this file matches itself and the
        # lint fails permanently.
        run: |
          if grep -rn "useanima\.shs" . --exclude-dir=node_modules --exclude-dir=.git; then
            echo "Found the rebrand-mangle token (grep output above): a corrupted 'anima.emails.*' identifier. Restore the original code instead."
            exit 1
          fi
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
