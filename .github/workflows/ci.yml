name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  test:
    name: Typecheck + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          # Pinned, not `latest`: resolving a floating tag makes the job depend
          # on api.github.com, so an API 503 fast-fails it before it runs —
          # observed 2026-07-16 on 6ecedfc, dead in 7s with every check skipped.
          # Caching is no protection either way — the cache key is the resolved
          # version, so the API call happens first regardless. (`cache: true`
          # was removed here: not a setup-bun@v2 input, so it was silently
          # ignored; v2 caches by default, disable via no-cache.)
          bun-version: 1.3.14
      - run: bun install --frozen-lockfile
      - name: Lint — rebrand mangle guard
        # The 2026-05 rebrand find-replace (anima.email → useanima.sh) mangled
        # the code identifier `anima.emails.*` into a nonsense token in other
        # repos (spec item C1). Fail CI if it ever appears here. NOTE: every
        # mention of the token in this step (pattern and message) must keep
        # the backslash-escaped dot, or this file matches itself and the
        # lint fails permanently.
        run: |
          if grep -rn "useanima\.shs" . --exclude-dir=node_modules --exclude-dir=.git; then
            echo "Found the rebrand-mangle token (grep output above): a corrupted 'anima.emails.*' identifier. Restore the original code instead."
            exit 1
          fi
      - name: Typecheck
        run: bun run typecheck
      - name: Test
        run: bun test
