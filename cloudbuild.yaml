# Cloud Build config for the unified Anima MCP server.
# Builds one image, deploys one Cloud Run service (mcp-server), min-instances=1.
# Replaces the 6-service Cloud Build in mcp-deploy/cloudbuild.yaml.

substitutions:
  _REGION: us-central1
  _REPO: anima
  _SERVICE: mcp-server

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=Dockerfile
      - --context=.
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:$COMMIT_SHA
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:latest
      - --cache=true
      - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server-cache
      - --compressed-caching=false
      - --snapshot-mode=redo

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:$COMMIT_SHA
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --concurrency=80
      - --allow-unauthenticated
      - --set-env-vars=NODE_ENV=production
      - --set-secrets=ANIMA_API_URL=API_URL:latest

# NOTE: NO `images:` block. Kaniko (build step) pushes images directly via
# its `--destination` flags rather than through Cloud Build's standard
# auto-push pipeline. If we list the kaniko-pushed image under `images:`,
# Cloud Build's post-step verification looks for it via its own pipeline,
# can't find it (kaniko already pushed it independently), and fails the
# whole build with:
#   "ERROR: failed to find one or more images after execution of build steps"
# even though every step succeeded and the new revision is serving traffic.
# Re-introduced 2026-05-09 because squash-merge of PR #5 silently dropped
# the original removal commit. If you re-add this block, expect spurious
# FAILURE markers on every successful deploy.
