# Cloud Build config for the unified Anima MCP server.
# Builds one image, deploys one Cloud Run service (mcp-server), min-instances=1.
# Replaces the 6-service Cloud Build in mcp-deploy/cloudbuild.yaml.

substitutions:
  _REGION: us-central1
  _REPO: anima
  _SERVICE: mcp-server
  # Image tag to build + deploy. Defaults to `latest` so a plain manual
  # `gcloud builds submit` always yields a VALID tag (the built-in $COMMIT_SHA
  # is empty on manual submits, which produced an invalid `mcp-server:` tag and
  # failed the deploy step). For an immutable, commit-stamped deploy, pass:
  #   --substitutions=_TAG=$(git rev-parse HEAD)
  _TAG: latest

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8

steps:
  - id: build
    name: gcr.io/kaniko-project/executor:latest
    args:
      - --dockerfile=Dockerfile
      - --context=.
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:${_TAG}
      - --destination=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:latest
      - --cache=true
      - --cache-repo=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server-cache
      - --compressed-caching=false
      - --snapshot-mode=redo

  - id: deploy
    name: gcr.io/google.com/cloudsdktool/cloud-sdk:latest
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPO}/mcp-server:${_TAG}
      - --region=${_REGION}
      - --platform=managed
      - --min-instances=1
      - --max-instances=10
      - --memory=512Mi
      - --cpu=1
      - --port=8080
      - --concurrency=80
      - --allow-unauthenticated
      # Plumb deploy identity into the runtime so Who_Am_I can answer
      # "did my fix actually land?" in one tool call. BUILD_ID is always set
      # per build. BUILD_SHA mirrors _TAG: the commit SHA when you pass
      # --substitutions=_TAG=$(git rev-parse HEAD), else "latest". (The
      # built-in $COMMIT_SHA is NOT auto-set on a manual `gcloud builds
      # submit` — only github-trigger builds populate it — which is why the
      # image tag + stamp key off _TAG.) K_REVISION is set by Cloud Run.
      - --set-env-vars=NODE_ENV=production,BUILD_SHA=${_TAG},BUILD_ID=$BUILD_ID
      - --set-secrets=ANIMA_API_URL=API_URL:latest

# NOTE: NO `images:` block. Kaniko (build step) pushes images directly via
# its `--destination` flags rather than through Cloud Build's standard
# auto-push pipeline. If we list the kaniko-pushed image under `images:`,
# Cloud Build's post-step verification looks for it via its own pipeline,
# can't find it (kaniko already pushed it independently), and fails the
# whole build with:
#   "ERROR: failed to find one or more images after execution of build steps"
# even though every step succeeded and the new revision is serving traffic.
# Re-introduced 2026-05-09 because squash-merge of PR #5 silently dropped
# the original removal commit. If you re-add this block, expect spurious
# FAILURE markers on every successful deploy.
